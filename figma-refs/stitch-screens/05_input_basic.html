    background-color: #F5EDD8;

<body class="traditional-bg min-h-screen font-body text-on-background max-w-[480px] mx-auto relative overflow-x-hidden pb-32">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-4 h-16 bg-[url('https://www.transparenttextures.com/patterns/natural-paper.png')] border-b border-[#D4B896] sticky top-0 z-50 bg-[#F5EDD8]">
<button class="w-10 h-10 flex items-center justify-center hover:bg-[#EDE0C4]/50 transition-all">
<span class="material-symbols-outlined text-[#3D2B1F]" data-icon="menu">menu</span>
</button>
<div class="flex items-center gap-2">
<span class="text-[#8B5A2B] text-xs">✦</span>
<h1 class="font-['Noto_Serif_KR'] font-bold text-xl tracking-widest text-[#3D2B1F]">이름풀이</h1>
<span class="text-[#8B5A2B] text-xs">✦</span>
</div>
<button class="w-10 h-10 flex items-center justify-center hover:bg-[#EDE0C4]/50 transition-all">
<span class="material-symbols-outlined text-[#3D2B1F]" data-icon="history">history</span>
</button>
</header>
<main class="px-6 py-8 space-y-12">
<!-- Vertical Brand Anchor -->
<div class="absolute right-4 top-24 pointer-events-none opacity-20">
<div class="text-2xl font-bold text-[#3D2B1F] vertical-text tracking-tighter">名解</div>
</div>
<!-- Section 1: Name Input -->
<section class="space-y-6">
<div class="flex items-center gap-3">
<span class="text-[#8B5A2B] text-lg">✦</span>
<h2 class="text-lg font-bold text-[#3D2B1F]">성함 입력</h2>
</div>
<div class="space-y-4">
<!-- Vertical Input Grid -->
<div class="grid grid-cols-1 gap-3">
<!-- Surname -->
<div class="flex items-center gap-3 bg-[#FAF5EA] border border-[#9C8B7A] p-3 rounded-sm group focus-within:border-[#C4973A] transition-colors">
<span class="text-xs text-[#9C8B7A] w-6">姓</span>
<input class="bg-transparent border-none focus:ring-0 text-xl font-bold w-full p-0 text-[#3D2B1F] placeholder-[#D4B896]" placeholder="성" type="text" value="김"/>
<div class="bg-[#EDE0C4] border border-[#C4973A] px-3 py-1 rounded-sm text-[#8B5A2B] font-bold text-lg">
                            金
                        </div>
</div>
<!-- First Name 1 -->
<div class="flex items-center gap-3 bg-[#FAF5EA] border border-[#9C8B7A] p-3 rounded-sm group focus-within:border-[#C4973A] transition-colors">
<span class="text-xs text-[#9C8B7A] w-6">名</span>
<input class="bg-transparent border-none focus:ring-0 text-xl font-bold w-full p-0 text-[#3D2B1F] placeholder-[#D4B896]" placeholder="이름 첫자" type="text" value="지"/>
<div class="bg-[#EDE0C4] border border-[#C4973A] px-3 py-1 rounded-sm text-[#8B5A2B] font-bold text-lg">
                            智
                        </div>
</div>
<!-- First Name 2 -->
<div class="flex items-center gap-3 bg-[#FAF5EA] border border-[#9C8B7A] p-3 rounded-sm group focus-within:border-[#C4973A] transition-colors">
<span class="text-xs text-[#9C8B7A] w-6">名</span>
<input class="bg-transparent border-none focus:ring-0 text-xl font-bold w-full p-0 text-[#3D2B1F] placeholder-[#D4B896]" placeholder="이름 끝자" type="text" value="연"/>
<div class="bg-[#EDE0C4] border border-[#C4973A] px-3 py-1 rounded-sm text-[#8B5A2B] font-bold text-lg">
                            淵
                        </div>
</div>
</div>
<!-- Hanja Selection Grid -->
<div class="bg-[#EDE0C4]/30 p-4 rounded-sm border border-[#D4B896]/50">
<p class="text-xs text-[#9C8B7A] mb-3">한자 선택 (연)</p>
<div class="grid grid-cols-2 gap-2">
<button class="bg-[#FAF5EA] border border-[#C4973A] p-3 flex flex-col items-center justify-center rounded-sm hover:bg-[#EDE0C4] transition-colors">
<span class="text-2xl font-bold text-[#3D2B1F]">淵</span>
<span class="text-xs text-[#8B5A2B]">못 연</span>
</button>
<button class="bg-[#FAF5EA] border border-[#D4B896] p-3 flex flex-col items-center justify-center rounded-sm hover:bg-[#EDE0C4] transition-colors">
<span class="text-2xl font-bold text-[#3D2B1F]">演</span>
<span class="text-xs text-[#8B5A2B]">펼칠 연</span>
</button>
</div>
</div>
<button class="text-[#8B5A2B] text-sm font-medium border-b border-dashed border-[#8B5A2B] pb-0.5 ml-auto block">
                    + 글자 추가
                </button>
</div>
</section>
<!-- Section 2: Date of Birth -->
<section class="space-y-6">
<div class="flex items-center gap-3">
<span class="text-[#8B5A2B] text-lg">✦</span>
<h2 class="text-lg font-bold text-[#3D2B1F]">생년월일</h2>
</div>
<div class="relative">
<input class="w-full bg-[#FAF5EA] border border-[#9C8B7A] p-4 rounded-sm text-lg font-medium tracking-widest text-[#3D2B1F] focus:border-[#C4973A] focus:ring-0" type="text" value="1995.05.21"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-[#9C8B7A]" data-icon="calendar_month">calendar_month</span>
</div>
</section>
<!-- Section 3: Birth Time -->
<section class="space-y-6">
<div class="flex items-center gap-3">
<span class="text-[#8B5A2B] text-lg">✦</span>
<h2 class="text-lg font-bold text-[#3D2B1F]">태어난 시간</h2>
</div>
<div class="space-y-4">
<!-- Segmented Toggle -->
<div class="flex p-1 bg-[#EDE0C4] rounded-sm">
<button class="flex-1 py-2 text-sm font-bold bg-[#3D2B1F] text-[#FAF5EA] rounded-sm">오전 (AM)</button>
<button class="flex-1 py-2 text-sm font-medium text-[#3D2B1F]">오후 (PM)</button>
</div>
<div class="grid grid-cols-2 gap-3">
<div class="bg-[#FAF5EA] border border-[#9C8B7A] p-3 rounded-sm flex items-center justify-between">
<span class="text-sm text-[#9C8B7A]">시</span>
<input class="bg-transparent border-none focus:ring-0 text-lg font-bold w-12 p-0 text-right text-[#3D2B1F]" type="number" value="10"/>
</div>
<div class="bg-[#FAF5EA] border border-[#9C8B7A] p-3 rounded-sm flex items-center justify-between">
<span class="text-sm text-[#9C8B7A]">분</span>
<input class="bg-transparent border-none focus:ring-0 text-lg font-bold w-12 p-0 text-right text-[#3D2B1F]" type="number" value="30"/>
</div>
</div>
<label class="flex items-center gap-2 cursor-pointer group">
<div class="w-5 h-5 border-2 border-[#9C8B7A] rounded-sm flex items-center justify-center group-hover:border-[#8B5A2B]">
<div class="w-2.5 h-2.5 bg-transparent"></div>
</div>
<span class="text-sm text-[#3D2B1F] font-medium">시간을 모릅니다</span>
</label>
</div>
</section>
<!-- Decorative Divider -->
<div class="flex items-center justify-center py-4">
<div class="h-[1px] bg-[#D4B896] flex-1"></div>
<div class="mx-4 text-[#8B5A2B] opacity-40">
<span class="material-symbols-outlined" data-icon="settings_input_component">settings_input_component</span>
</div>
<div class="h-[1px] bg-[#D4B896] flex-1"></div>
</div>
<div class="relative w-full h-40 rounded-sm overflow-hidden border border-[#D4B896]">
<img alt="Traditional Korean painting" class="w-full h-full object-cover opacity-60" data-alt="Traditional Korean landscape painting with soft ink wash, misty mountains, and plum blossoms on aged hanji paper texture" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCQXI70Ri0rz-XlDiDBu5MJiCZUmlNVi6USP9xMDQfkZLHLL0SS5rzhPhymz7OVXKBQCdtNZ1HMPIr9SDdpYBJqUAZmCs8IdB5IIy3Xlqz0EeobOGo6I_xKM7WuG9HpiUKpFaWK8aBpABRnTOuazgi6dD9rHySETA16k-vu1s3wX9lgCv_wXQBvUse4ldbjRKpuTZn3tVIN6vqunOLiFNtdQi3Cn9Xj6dekicSRfP5NByOVPEaUKHQfCxdEAMd1Fq5_GKyy8QoG0Qs"/>
<div class="absolute inset-0 bg-gradient-to-t from-[#F5EDD8] to-transparent"></div>
<p class="absolute bottom-4 left-4 right-4 text-xs text-[#3D2B1F] leading-relaxed italic">
                "이름은 인생의 첫 단추이자 평생을 함께하는 귀한 선물입니다. 당신의 이름 속에 담긴 운명의 흐름을 짚어드립니다."
            </p>
</div>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full z-50 bg-[#F5EDD8]/95 backdrop-blur-sm border-t border-[#D4B896] px-4 pt-4 pb-safe shadow-[0_-10px_20px_rgba(0,0,0,0.05)]">
<div class="flex flex-col items-center gap-3 mb-4">
<p class="text-[10px] text-[#9C8B7A] flex items-center gap-1">
<span class="material-symbols-outlined text-[12px]" data-icon="lock">lock</span>
                토스페이먼츠 안전 결제
            </p>
<button class="w-full bg-[#3D2B1F] text-[#F5EDD8] py-4 rounded-sm flex items-center justify-center gap-4 active:scale-95 transition-transform">
<span class="text-[#C4973A] text-lg">✦</span>
<span class="font-bold text-lg tracking-widest">운세 보기</span>
<span class="text-[#C4973A] text-lg">✦</span>
</button>
</div>
</div>
<!-- Bottom Navigation (Invisible context based on Shell Logic, but structure kept for consistency) -->
<nav class="fixed bottom-0 left-0 w-full z-40 bg-[#F5EDD8] border-t border-[#D4B896] flex justify-around items-center px-4 py-2 pb-safe hidden">
<div class="flex flex-col items-center justify-center text-[#9C8B7A]">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="text-[10px] font-medium">홈</span>
</div>
<div class="flex flex-col items-center justify-center text-[#8B5A2B] bg-[#EDE0C4] rounded-xl px-3 py-1">
<span class="material-symbols-outlined" data-icon="ink_pen">ink_pen</span>
<span class="text-[10px] font-medium">이름풀이</span>
</div>
<div class="flex flex-col items-center justify-center text-[#9C8B7A]">
<span class="material-symbols-outlined" data-icon="auto_stories">auto_stories</span>
<span class="text-[10px] font-medium">사주</span>
</div>
<div class="flex flex-col items-center justify-center text-[#9C8B7A]">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="text-[10px] font-medium">내 정보</span>
</div>
</nav>
